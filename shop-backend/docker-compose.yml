# Local PostgreSQL for shop-backend + JWT auth (MVP).
# Run: docker compose up -d
# Then: DATABASE_URL=postgresql://shop:shop@localhost:5433/shop npm run dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shop
      POSTGRES_PASSWORD: shop
      POSTGRES_DB: shop
    ports:
      - '5433:5432'
    volumes:
      - shop_pg_data:/var/lib/postgresql/data

volumes:
  shop_pg_data:
